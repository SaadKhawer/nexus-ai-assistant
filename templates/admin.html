<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — NexusAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root{--bg:#05070f;--card:#0f1222;--card2:#111427;--border:rgba(99,120,255,0.15);--accent1:#6378ff;--accent2:#a78bfa;--accent3:#38bdf8;--green:#22c55e;--text:#e2e8f8;--muted:#6b7280;--grad:linear-gradient(135deg,#6378ff,#a78bfa);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(99,120,255,0.10) 0%,transparent 60%);pointer-events:none;}

        .header{padding:0 32px;height:62px;background:rgba(12,15,30,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
        .header-left{display:flex;align-items:center;gap:12px;}
        .logo{width:32px;height:32px;background:var(--grad);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 16px rgba(99,120,255,0.4);}
        .header h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .btn-back{padding:8px 16px;background:rgba(99,120,255,0.1);color:var(--accent1);border:1px solid rgba(99,120,255,0.2);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;text-decoration:none;}
        .btn-back:hover{background:rgba(99,120,255,0.18);}

        .content{padding:28px 32px;max-width:1200px;margin:0 auto;}

        /* Stats cards */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:transform 0.15s;}
        .stat-card:hover{transform:translateY(-2px);}
        .stat-card::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity 0.2s;}
        .stat-card:hover::before{opacity:0.04;}
        .stat-label{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
        .stat-value{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .stat-icon{position:absolute;right:16px;top:16px;font-size:24px;opacity:0.3;}

        /* Charts */
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
        @media(max-width:768px){.charts-grid{grid-template-columns:1fr;}}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
        .chart-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text);}

        /* Users table */
        .table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
        .table-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;}
        table{width:100%;border-collapse:collapse;}
        th{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
        td{padding:10px 12px;font-size:13.5px;border-bottom:1px solid rgba(99,120,255,0.06);}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(99,120,255,0.04);}
        .role-badge{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;}
        .role-admin{background:rgba(99,120,255,0.15);color:var(--accent1);}
        .role-employee{background:rgba(56,189,248,0.1);color:var(--accent3);}
        .btn-role{padding:4px 10px;font-size:11px;font-weight:600;border-radius:7px;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--muted);transition:background 0.2s,color 0.2s;}
        .btn-role:hover{background:rgba(99,120,255,0.1);color:var(--accent1);}

        .loading{text-align:center;color:var(--muted);padding:40px;font-size:14px;}
    </style>
</head>
<body>
<div class="header">
    <div class="header-left">
        <div class="logo">✦</div>
        <h1>Admin Dashboard</h1>
    </div>
    <a href="/" class="btn-back">← Back to Chat</a>
</div>

<div class="content">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="sUsers">—</div><div class="stat-icon">👥</div></div>
        <div class="stat-card"><div class="stat-label">Total Chats</div><div class="stat-value" id="sChats">—</div><div class="stat-icon">💬</div></div>
        <div class="stat-card"><div class="stat-label">Total Messages</div><div class="stat-value" id="sMsgs">—</div><div class="stat-icon">✉️</div></div>
        <div class="stat-card"><div class="stat-label">KB Chunks</div><div class="stat-value" id="sKB">—</div><div class="stat-icon">🧠</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-title">📈 Chats Per Day (Last 7 Days)</div>
            <canvas id="dailyChart" height="200"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-title">👥 Chats Per User</div>
            <canvas id="userChart" height="200"></canvas>
        </div>
    </div>

    <div class="table-card">
        <div class="table-title">👤 All Users</div>
        <table>
            <thead><tr><th>#</th><th>Username</th><th>Email</th><th>Role</th><th>Chats</th><th>Action</th></tr></thead>
            <tbody id="userTable"><tr><td colspan="6" class="loading">Loading...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
async function loadDashboard(){
    try{
        const r=await fetch('/admin/stats');
        const d=await r.json();

        document.getElementById('sUsers').textContent=d.total_users;
        document.getElementById('sChats').textContent=d.total_chats;
        document.getElementById('sMsgs').textContent=d.total_messages;
        document.getElementById('sKB').textContent=d.kb_chunks;

        // Daily chart
        const days=d.daily.map(x=>x.date.slice(5));
        const counts=d.daily.map(x=>x.count);
        new Chart(document.getElementById('dailyChart'),{
            type:'bar',
            data:{labels:days,datasets:[{label:'Chats',data:counts,
                backgroundColor:'rgba(99,120,255,0.5)',borderColor:'#6378ff',borderWidth:2,borderRadius:6}]},
            options:{responsive:true,plugins:{legend:{display:false}},
                scales:{y:{beginAtZero:true,ticks:{stepSize:1,color:'#6b7280'},grid:{color:'rgba(99,120,255,0.1)'}},
                        x:{ticks:{color:'#6b7280'},grid:{display:false}}}}
        });

        // User chart
        const unames=d.by_user.map(x=>x.username);
        const uchats=d.by_user.map(x=>x.chats);
        const colors=['#6378ff','#a78bfa','#38bdf8','#22c55e','#f59e0b','#f87171'];
        new Chart(document.getElementById('userChart'),{
            type:'doughnut',
            data:{labels:unames,datasets:[{data:uchats,backgroundColor:colors.slice(0,unames.length),borderWidth:0}]},
            options:{responsive:true,plugins:{legend:{labels:{color:'#e2e8f8',font:{size:12}}}}}
        });

        // Users table
        const tbody=document.getElementById('userTable');
        tbody.innerHTML='';
        d.by_user.forEach((u,i)=>{
            const tr=document.createElement('tr');
            tr.innerHTML=`<td>${i+1}</td><td><strong>${u.username}</strong></td>
                <td style="color:var(--muted)">${u.email||'—'}</td>
                <td><span class="role-badge role-${u.role}">${u.role}${u.role==='admin'?' 👑':''}</span></td>
                <td>${u.chats}</td>
                <td><button class="btn-role" onclick="toggleRole(${u.id},'${u.role}',this)">
                    ${u.role==='admin'?'→ Employee':'→ Admin'}</button></td>`;
            tbody.appendChild(tr);
        });

    }catch(e){ console.error(e); }
}

async function toggleRole(uid, currentRole, btn){
    const newRole = currentRole==='admin'?'employee':'admin';
    if(!confirm(`Change role to ${newRole}?`)) return;
    await fetch(`/admin/users/${uid}/role`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:newRole})});
    loadDashboard();
}

loadDashboard();
</script>
</body>
</html>
