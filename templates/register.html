<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — NexusAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#05070f; --card:#0f1222; --border:rgba(99,120,255,0.18);
            --accent1:#6378ff; --accent2:#a78bfa; --text:#e2e8f8; --muted:#6b7280;
            --grad:linear-gradient(135deg,#6378ff,#a78bfa);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'DM Sans',sans-serif;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(ellipse 70% 50% at 20% 20%, rgba(99,120,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(167,139,250,0.09) 0%, transparent 60%);
            pointer-events:none;
        }
        .box {
            width:100%; max-width:420px;
            background:var(--card); border:1px solid var(--border);
            border-radius:20px; padding:36px 32px;
            box-shadow:0 24px 60px rgba(0,0,0,0.5);
            position:relative; z-index:1;
            animation:fadeUp 0.4s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
        .logo-icon {
            width:38px; height:38px; background:var(--grad);
            border-radius:11px; display:flex; align-items:center; justify-content:center;
            font-size:18px; box-shadow:0 0 20px rgba(99,120,255,0.4);
        }
        .logo-name {
            font-family:'Syne',sans-serif; font-size:20px; font-weight:800;
            background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        h2 { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; margin-bottom:6px; }
        .subtitle { color:var(--muted); font-size:13.5px; margin-bottom:26px; }
        .field { margin-bottom:14px; }
        label { display:block; font-size:12px; font-weight:600; color:var(--muted);
                letter-spacing:0.5px; text-transform:uppercase; margin-bottom:6px; }
        input {
            width:100%; padding:12px 16px;
            background:rgba(99,120,255,0.06);
            border:1px solid var(--border); border-radius:11px;
            color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
            outline:none; transition:border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color:var(--accent1); box-shadow:0 0 0 3px rgba(99,120,255,0.12); }
        input::placeholder { color:#3d4460; }
        .btn {
            width:100%; padding:13px;
            background:var(--grad); color:#fff; border:none;
            border-radius:12px; font-family:'Syne',sans-serif;
            font-size:15px; font-weight:700; cursor:pointer; margin-top:6px;
            transition:transform 0.15s, box-shadow 0.2s;
            box-shadow:0 4px 20px rgba(99,120,255,0.35);
        }
        .btn:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(99,120,255,0.5); }
        .error {
            background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25);
            color:#f87171; border-radius:10px; padding:10px 14px;
            font-size:13px; margin-bottom:14px; display:none;
        }
        .footer-link { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
        .footer-link a { color:var(--accent2); text-decoration:none; font-weight:600; }
        .footer-link a:hover { text-decoration:underline; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <div class="logo-icon">✦</div>
        <span class="logo-name">NexusAI</span>
    </div>
    <h2>Create account</h2>
    <p class="subtitle">Join NexusAI — your company AI assistant</p>
    <div class="error" id="errMsg"></div>
    <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username" />
    </div>
    <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@company.com" />
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters"
               onkeydown="if(event.key==='Enter') doRegister()" />
    </div>
    <button class="btn" onclick="doRegister()">Create Account →</button>
    <div class="footer-link">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>
<script>
async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !email || !password) { showErr('Please fill all fields'); return; }
    if (password.length < 6) { showErr('Password must be at least 6 characters'); return; }
    try {
        const res  = await fetch('/register', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username, email, password})
        });
        const data = await res.json();
        if (data.success) { window.location.href = '/'; }
        else { showErr(data.error || 'Registration failed'); }
    } catch { showErr('Server error. Try again.'); }
}
function showErr(msg) {
    const e = document.getElementById('errMsg');
    e.textContent = msg; e.style.display = 'block';
}
</script>
</body>
</html>
